name: Build AppImage

on:
  push:
    branches: [main]
    tags: ['v*.*.*.*']
  pull_request:
    branches: [main]

jobs:
  build:
    # Ubuntu 20.04 → glibc 2.31. Lowest practical baseline for a PipeWire app.
    # The resulting AppImage runs on any distro with glibc ≥ 2.31 and PipeWire.
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init Resources submodule
        run: git submodule update --init Resources

      # Cache the JUCE clone — it rarely changes and is ~300 MB uncompressed.
      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: third_party/JUCE
          key: juce-6.1.6

      - name: Clone JUCE 6.1.6
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 6.1.6 \
            https://github.com/juce-framework/JUCE third_party/JUCE

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Enable universe for libpipewire-0.3-dev on 20.04
          sudo add-apt-repository -y universe
          sudo apt-get install -y \
            cmake ninja-build \
            libx11-dev libxext-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libfreetype6-dev libfontconfig1-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libglib2.0-dev \
            libpipewire-0.3-dev \
            libxcb-dev libxcb-keysyms1-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install into AppDir
        run: DESTDIR=$PWD/AppDir cmake --install build

      # Cache the AppImage tools — they are large binaries fetched from GitHub.
      - name: Cache AppImage tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: appimage-tools
          key: appimage-tools-20240101

      - name: Download AppImage tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p appimage-tools
          curl -fsSL \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" \
            -o appimage-tools/linuxdeploy
          curl -fsSL \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimage-tools/appimagetool
          chmod +x appimage-tools/linuxdeploy appimage-tools/appimagetool

      - name: Prepare AppDir root
        run: |
          cp AppDir/usr/share/applications/fxsound.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/256x256/apps/fxsound.png AppDir/
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export XDG_DATA_DIRS="$HERE/usr/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
          export LD_LIBRARY_PATH="$HERE/usr/lib:${LD_LIBRARY_PATH:-}"
          exec "$HERE/usr/bin/fxsound" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Bundle shared libraries
        # NO_STRIP=1: linuxdeploy's bundled strip does not understand .relr.dyn
        # sections from gcc 11+ and exits 1, failing the build. Release binaries
        # are already optimised so stripping gains nothing here.
        # APPIMAGE_EXTRACT_AND_RUN=1: run AppImages without FUSE (not available
        # in the GitHub Actions sandbox).
        env:
          NO_STRIP: "1"
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          appimage-tools/linuxdeploy \
            --appdir AppDir \
            --executable AppDir/usr/bin/fxsound

      - name: Determine version
        id: version
        run: |
          VER=$(grep -m1 'project(FxSound VERSION' CMakeLists.txt \
                | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "appimage=FxSound-${VER}-x86_64.AppImage" >> "$GITHUB_OUTPUT"

      - name: Pack AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          appimage-tools/appimagetool \
            --comp gzip \
            AppDir "${{ steps.version.outputs.appimage }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.appimage }}
          path: ${{ steps.version.outputs.appimage }}
          retention-days: 30

      # Only publish a release on version tags (v1.2.3.4).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.version.outputs.appimage }}
          generate_release_notes: true
